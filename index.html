<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Text Share</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:Arial;">

<h1 id="text">Loading...</h1>

<input id="input" placeholder="Tulis sesuatu..." />
<br><br>
<button onclick="saveText()">Simpan</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDxqv5YTcRpBBoqXUwtUu5QPJygerDyS_E",
    authDomain: "text-share-ab1b0.firebaseapp.com",
    projectId: "text-share-ab1b0",
    storageBucket: "text-share-ab1b0.firebasestorage.app",
    messagingSenderId: "693756589185",
    appId: "1:693756589185:web:92149d85d713931b1ac980"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const textDiv = document.getElementById("text");
  const input = document.getElementById("input");

  async function loadText() {
    const docRef = doc(db, "data", "main");
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      textDiv.innerText = docSnap.data().text;
    } else {
      textDiv.innerText = "Belum ada text";
    }
  }

  window.saveText = async function () {
    const value = input.value;

    if (!value) return alert("Isi dulu!");

    await setDoc(doc(db, "data", "main"), {
      text: value
    });

    textDiv.innerText = value;
  }

  loadText();
</script>

</body>
</html>
